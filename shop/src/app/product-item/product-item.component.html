<div style="border:1px solid gray; margin:10px; padding:10px; width:200px;">
  <h3>{{ product.name }}</h3>

  <img [src]="product.image" width="150" *ngIf="product.image" alt="{{ product.name }}">

  <p *ngIf="product.description">{{ product.description }}</p>

  <p *ngIf="product.price">Price: {{ product.price }} ₸</p>

  <p *ngIf="product.rating">Rating: {{ product.rating }}</p>

  <p>Likes: {{ product.likes }}</p>

  <div style="margin-top:5px;">
    <button (click)="like()">❤️ Like</button>
    <button (click)="remove()">🗑 Delete</button>
    <button (click)="share()">📤 Share</button>
  </div>
</div>
