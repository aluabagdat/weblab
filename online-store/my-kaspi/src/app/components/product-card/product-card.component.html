<div class="card">

  <img [src]="product.image">

  <h2>{{ product.name }}</h2>

  <p>{{ product.description }}</p>

  <div class="price">
    {{ product.price }} ₸
  </div>

  <div class="rating">
    ⭐ {{ product.rating }}
  </div>

  <a [href]="product.link" target="_blank">
    Посмотреть на kaspi.kz
  </a>

  <div class="buttons">

    <button (click)="shareWhatsApp()">
      Отправить в Whatsapp
    </button>

    <button (click)="shareTelegram()">
      Отправить в Telegram
    </button>

  </div>

</div>
